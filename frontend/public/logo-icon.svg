<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer hex ring -->
  <path d="M24 2 L43.6 13 L43.6 35 L24 46 L4.4 35 L4.4 13 Z"
        stroke="#d4a052" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Inner hex -->
  <path d="M24 8 L38 16 L38 32 L24 40 L10 32 L10 16 Z"
        stroke="#d4a052" stroke-width="0.8" fill="rgba(212,160,82,0.06)" opacity="0.4"/>
  <!-- Central spirit eye -->
  <ellipse cx="24" cy="22" rx="7" ry="5" fill="none" stroke="#d4a052" stroke-width="1.2" opacity="0.8"/>
  <circle cx="24" cy="22" r="2.5" fill="#d4a052" opacity="0.9"/>
  <circle cx="24" cy="22" r="1" fill="#fff" opacity="0.7"/>
  <!-- Whisper rays emanating from eye -->
  <line x1="24" y1="14" x2="24" y2="9" stroke="#d4a052" stroke-width="0.7" opacity="0.5"/>
  <line x1="30" y1="17" x2="34" y2="13" stroke="#d4a052" stroke-width="0.7" opacity="0.4"/>
  <line x1="18" y1="17" x2="14" y2="13" stroke="#d4a052" stroke-width="0.7" opacity="0.4"/>
  <!-- Swarm dots below -->
  <circle cx="18" cy="33" r="1.5" fill="#d4a052" opacity="0.5"/>
  <circle cx="24" cy="35" r="1.5" fill="#d4a052" opacity="0.6"/>
  <circle cx="30" cy="33" r="1.5" fill="#d4a052" opacity="0.5"/>
  <!-- Connection lines between swarm dots -->
  <line x1="18" y1="33" x2="24" y2="35" stroke="#d4a052" stroke-width="0.5" opacity="0.3"/>
  <line x1="24" y1="35" x2="30" y2="33" stroke="#d4a052" stroke-width="0.5" opacity="0.3"/>
  <line x1="18" y1="33" x2="30" y2="33" stroke="#d4a052" stroke-width="0.5" opacity="0.2"/>
</svg>
