<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="60%" stop-color="#0e0c14"/>
      <stop offset="100%" stop-color="#060a12"/>
    </radialGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a052" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a052" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-glow)"/>

  <!-- Ambient glow behind eye -->
  <circle cx="256" cy="230" r="120" fill="url(#eye-glow)"/>

  <!-- Outer hex ring -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <polygon points="0,-180 155.88,-90 155.88,90 0,180 -155.88,90 -155.88,-90"
             stroke="#d4a052" stroke-width="2.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Inner hex -->
  <g transform="translate(256,256)">
    <polygon points="0,-140 121.24,-70 121.24,70 0,140 -121.24,70 -121.24,-70"
             stroke="#d4a052" stroke-width="1.2" fill="rgba(212,160,82,0.04)" opacity="0.35"/>
  </g>

  <!-- Decorative hex corners — rune marks -->
  <g transform="translate(256,256)" opacity="0.25">
    <line x1="-3" y1="-175" x2="3" y2="-175" stroke="#d4a052" stroke-width="3"/>
    <line x1="150" y1="-87" x2="153" y2="-82" stroke="#d4a052" stroke-width="3"/>
    <line x1="150" y1="87" x2="153" y2="82" stroke="#d4a052" stroke-width="3"/>
    <line x1="-3" y1="175" x2="3" y2="175" stroke="#d4a052" stroke-width="3"/>
    <line x1="-150" y1="87" x2="-153" y2="82" stroke="#d4a052" stroke-width="3"/>
    <line x1="-150" y1="-87" x2="-153" y2="-82" stroke="#d4a052" stroke-width="3"/>
  </g>

  <!-- Central spirit eye -->
  <g transform="translate(256,230)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="75" ry="52" fill="none" stroke="#d4a052" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="28" fill="#d4a052" opacity="0.9"/>
    <circle cx="0" cy="0" r="12" fill="#fff" opacity="0.6"/>
    <circle cx="5" cy="-3" r="5" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Whisper rays emanating from eye -->
  <g transform="translate(256,230)" opacity="0.5" filter="url(#soft-glow)">
    <line x1="0" y1="-55" x2="0" y2="-100" stroke="#d4a052" stroke-width="1.5" stroke-dasharray="4,6"/>
    <line x1="50" y1="-35" x2="85" y2="-65" stroke="#d4a052" stroke-width="1.5" stroke-dasharray="4,6"/>
    <line x1="-50" y1="-35" x2="-85" y2="-65" stroke="#d4a052" stroke-width="1.5" stroke-dasharray="4,6"/>
    <line x1="70" y1="5" x2="110" y2="5" stroke="#d4a052" stroke-width="1" stroke-dasharray="3,5" opacity="0.4"/>
    <line x1="-70" y1="5" x2="-110" y2="5" stroke="#d4a052" stroke-width="1" stroke-dasharray="3,5" opacity="0.4"/>
  </g>

  <!-- Swarm constellation below -->
  <g transform="translate(256,350)" filter="url(#glow)">
    <!-- Main swarm spirits -->
    <circle cx="-60" cy="0" r="8" fill="#d4a052" opacity="0.6"/>
    <circle cx="0" cy="20" r="10" fill="#d4a052" opacity="0.7"/>
    <circle cx="60" cy="0" r="8" fill="#d4a052" opacity="0.6"/>
    <!-- Inner dots -->
    <circle cx="-60" cy="0" r="3" fill="#fff" opacity="0.4"/>
    <circle cx="0" cy="20" r="4" fill="#fff" opacity="0.5"/>
    <circle cx="60" cy="0" r="3" fill="#fff" opacity="0.4"/>
    <!-- Connection lines -->
    <line x1="-60" y1="0" x2="0" y2="20" stroke="#d4a052" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="20" x2="60" y2="0" stroke="#d4a052" stroke-width="1.2" opacity="0.35"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#d4a052" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,4"/>
    <!-- Satellite dots -->
    <circle cx="-30" cy="-15" r="4" fill="#d4a052" opacity="0.3"/>
    <circle cx="30" cy="-15" r="4" fill="#d4a052" opacity="0.3"/>
    <circle cx="0" cy="45" r="4" fill="#d4a052" opacity="0.25"/>
    <!-- Whisper trails from eye to swarm -->
    <line x1="-40" y1="-80" x2="-60" y2="0" stroke="#d4a052" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,5"/>
    <line x1="0" y1="-80" x2="0" y2="20" stroke="#d4a052" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,5"/>
    <line x1="40" y1="-80" x2="60" y2="0" stroke="#d4a052" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,5"/>
  </g>

  <!-- Ghost spirit (purple, faded) -->
  <g transform="translate(175,310)" opacity="0.35">
    <circle cx="0" cy="0" r="6" fill="#a855f7"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="2,3"/>
  </g>

  <!-- Title text -->
  <text x="256" y="460" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="12" fill="#d4a052" opacity="0.8">
    ANIMA SWARM
  </text>
</svg>
