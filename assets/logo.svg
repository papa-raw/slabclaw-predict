<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="60%" stop-color="#0d0a1a"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>

    <!-- Amber glow gradient -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#d97706" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>

    <!-- Eye iris gradient -->
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>

    <!-- Spirit particle glow -->
    <radialGradient id="spiritGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="1"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm spirit -->
    <radialGradient id="warmSpirit" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Sui blue spirit -->
    <radialGradient id="suiSpirit" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6fbcf0" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4da2d9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2b7cb8" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient glow behind eye -->
  <ellipse cx="512" cy="512" rx="320" ry="320" fill="url(#amberGlow)"/>

  <!-- Orbital rings (subtle) -->
  <ellipse cx="512" cy="512" rx="380" ry="160" fill="none" stroke="#d97706" stroke-width="0.5" stroke-opacity="0.15" transform="rotate(-15, 512, 512)"/>
  <ellipse cx="512" cy="512" rx="340" ry="200" fill="none" stroke="#67e8f9" stroke-width="0.5" stroke-opacity="0.12" transform="rotate(25, 512, 512)"/>
  <ellipse cx="512" cy="512" rx="420" ry="140" fill="none" stroke="#f59e0b" stroke-width="0.4" stroke-opacity="0.08" transform="rotate(-40, 512, 512)"/>

  <!-- === DEITY EYE === -->

  <!-- Eye outer shape (almond) -->
  <path d="M 200 512 Q 356 340 512 340 Q 668 340 824 512 Q 668 684 512 684 Q 356 684 200 512 Z"
        fill="none" stroke="#d97706" stroke-width="2.5" stroke-opacity="0.6" filter="url(#glow)"/>

  <!-- Eye outer fill (very subtle) -->
  <path d="M 220 512 Q 366 355 512 355 Q 658 355 804 512 Q 658 669 512 669 Q 366 669 220 512 Z"
        fill="#1a0e05" fill-opacity="0.4"/>

  <!-- Iris outer ring -->
  <circle cx="512" cy="512" r="120" fill="none" stroke="#d97706" stroke-width="2" stroke-opacity="0.5" filter="url(#softGlow)"/>

  <!-- Iris -->
  <circle cx="512" cy="512" r="110" fill="url(#iris)" opacity="0.9"/>

  <!-- Iris detail rays -->
  <g opacity="0.3">
    <line x1="512" y1="402" x2="512" y2="440" stroke="#fde68a" stroke-width="1"/>
    <line x1="512" y1="584" x2="512" y2="622" stroke="#fde68a" stroke-width="1"/>
    <line x1="432" y1="450" x2="455" y2="472" stroke="#fde68a" stroke-width="0.8"/>
    <line x1="592" y1="450" x2="569" y2="472" stroke="#fde68a" stroke-width="0.8"/>
    <line x1="432" y1="574" x2="455" y2="552" stroke="#fde68a" stroke-width="0.8"/>
    <line x1="592" y1="574" x2="569" y2="552" stroke="#fde68a" stroke-width="0.8"/>
    <line x1="402" y1="512" x2="440" y2="512" stroke="#fde68a" stroke-width="1"/>
    <line x1="584" y1="512" x2="622" y2="512" stroke="#fde68a" stroke-width="1"/>
  </g>

  <!-- Pupil -->
  <circle cx="512" cy="512" r="45" fill="#0d0a1a"/>
  <circle cx="512" cy="512" r="42" fill="#1a0e05"/>

  <!-- Pupil highlight -->
  <circle cx="497" cy="497" r="12" fill="#fde68a" opacity="0.7"/>
  <circle cx="530" cy="525" r="6" fill="#fde68a" opacity="0.3"/>

  <!-- Inner eye highlight lines -->
  <path d="M 260 512 Q 386 390 512 390" fill="none" stroke="#fde68a" stroke-width="1" stroke-opacity="0.2"/>
  <path d="M 512 390 Q 638 390 764 512" fill="none" stroke="#fde68a" stroke-width="1" stroke-opacity="0.15"/>

  <!-- === SPIRIT PARTICLES (orbiting) === -->

  <!-- Cyan spirits (Walrus/Sui color nod) -->
  <circle cx="190" cy="420" r="8" fill="url(#spiritGlow)" filter="url(#softGlow)"/>
  <circle cx="160" cy="445" r="3" fill="#67e8f9" opacity="0.4"/>

  <circle cx="835" cy="600" r="7" fill="url(#spiritGlow)" filter="url(#softGlow)"/>
  <circle cx="855" cy="580" r="2.5" fill="#67e8f9" opacity="0.3"/>

  <circle cx="380" cy="250" r="5" fill="url(#spiritGlow)" filter="url(#softGlow)"/>

  <circle cx="700" cy="280" r="6" fill="url(#suiSpirit)" filter="url(#softGlow)"/>
  <circle cx="720" cy="265" r="2" fill="#6fbcf0" opacity="0.4"/>

  <circle cx="310" cy="730" r="5.5" fill="url(#suiSpirit)" filter="url(#softGlow)"/>

  <!-- Amber spirits (deity color) -->
  <circle cx="820" cy="410" r="6" fill="url(#warmSpirit)" filter="url(#softGlow)"/>
  <circle cx="840" cy="395" r="2" fill="#fbbf24" opacity="0.3"/>

  <circle cx="200" cy="620" r="5" fill="url(#warmSpirit)" filter="url(#softGlow)"/>

  <circle cx="650" cy="750" r="7" fill="url(#warmSpirit)" filter="url(#softGlow)"/>
  <circle cx="670" cy="735" r="2.5" fill="#fbbf24" opacity="0.4"/>

  <circle cx="440" cy="200" r="4" fill="url(#warmSpirit)" filter="url(#softGlow)"/>

  <!-- Distant tiny spirits -->
  <circle cx="140" cy="350" r="2" fill="#67e8f9" opacity="0.25"/>
  <circle cx="880" cy="670" r="2" fill="#67e8f9" opacity="0.2"/>
  <circle cx="750" cy="200" r="1.5" fill="#fbbf24" opacity="0.2"/>
  <circle cx="270" cy="800" r="2" fill="#6fbcf0" opacity="0.2"/>
  <circle cx="580" cy="180" r="1.5" fill="#67e8f9" opacity="0.15"/>
  <circle cx="130" cy="560" r="1.5" fill="#fbbf24" opacity="0.15"/>
  <circle cx="890" cy="460" r="2" fill="#d97706" opacity="0.15"/>
  <circle cx="460" cy="830" r="1.5" fill="#22d3ee" opacity="0.2"/>
  <circle cx="780" cy="770" r="2" fill="#f59e0b" opacity="0.15"/>
  <circle cx="250" cy="280" r="1.5" fill="#06b6d4" opacity="0.2"/>

  <!-- Spirit trails (thin lines from particles toward eye) -->
  <line x1="190" y1="420" x2="300" y2="470" stroke="#67e8f9" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="835" y1="600" x2="720" y2="560" stroke="#67e8f9" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="820" y1="410" x2="710" y2="460" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="650" y1="750" x2="580" y2="650" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="700" y1="280" x2="630" y2="370" stroke="#6fbcf0" stroke-width="0.4" stroke-opacity="0.1"/>
  <line x1="310" y1="730" x2="400" y2="650" stroke="#6fbcf0" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- === HEX GRID OVERLAY (very subtle, bottom corners) === -->
  <g opacity="0.06" stroke="#d97706" stroke-width="0.8" fill="none">
    <!-- Bottom-left hex cluster -->
    <polygon points="80,860 100,845 120,860 120,885 100,900 80,885"/>
    <polygon points="120,860 140,845 160,860 160,885 140,900 120,885"/>
    <polygon points="100,900 120,885 140,900 140,925 120,940 100,925"/>
    <polygon points="60,900 80,885 100,900 100,925 80,940 60,925"/>

    <!-- Bottom-right hex cluster -->
    <polygon points="864,860 884,845 904,860 904,885 884,900 864,885"/>
    <polygon points="904,860 924,845 944,860 944,885 924,900 904,885"/>
    <polygon points="884,900 904,885 924,900 924,925 904,940 884,925"/>
    <polygon points="844,900 864,885 884,900 884,925 864,940 844,925"/>
  </g>

  <!-- === TEXT === -->
  <text x="512" y="920" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="600" letter-spacing="12" fill="#d97706" opacity="0.85" filter="url(#softGlow)">
    ANIMA SWARM
  </text>

  <text x="512" y="955" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="400" letter-spacing="6" fill="#67e8f9" opacity="0.45">
    WHISPER TO THE SWARM
  </text>
</svg>
